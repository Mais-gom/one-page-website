<!DOCTYPE html>
<html>
<head>
  <title>One Page Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>One Page Website</h1>

  <div class="gallery">
    <img src="images/image1.jpg" class="gallery-img" data-index="0">
    <img src="images/image2.jpg" class="gallery-img" data-index="1">
    <img src="images/image3.jpg" class="gallery-img" data-index="2">
  </div>

  <div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <button id="prevBtn" class="prev">&#10094;</button>
    <img id="lightbox-img" class="lightbox-img">
    <button id="nextBtn" class="next">&#10095;</button>
  </div>

  <script src="script.js"></script>

</body>
</html>
