<!DOCTYPE html>
<html>
<head>
  <title>My One-Page Website</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Welcome to My One-Page Website</h1>
    <p>This website includes a functional lightbox image gallery.</p>
  </header>

  <section>
    <h2>My Image Gallery</h2>

    <div class="gallery">
      <img src="images/image1.jpg" alt="Gallery Image" class="gallery-img">
    </div>
  </section>

  <div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <img id="lightbox-img" class="lightbox-content" alt="Enlarged gallery image">
  </div>

  <script src="script.js"></script>

</body>
</html>
